kind = "web"
previewPath = "/"
title = "Transport SaaS"
version = "1.0.0"
id = "artifacts/transport-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20223

[services.development]
run = "pnpm --filter @workspace/transport-saas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transport-saas", "run", "build" ]
publicDir = "artifacts/transport-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20223"
BASE_PATH = "/"
