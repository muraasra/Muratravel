components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── Company ───
    Company:
      type: object
      required: [id, name, country, currency, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        logo:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        country:
          type: string
        currency:
          type: string
        language:
          type: string
        status:
          type: string
          enum: [active, suspended, inactive]
        createdAt:
          type: string

    CompanyInput:
      type: object
      required: [name, country, currency]
      properties:
        name:
          type: string
        logo:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        country:
          type: string
        currency:
          type: string
        language:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        logo:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        country:
          type: string
        currency:
          type: string
        language:
          type: string
        status:
          type: string
          enum: [active, suspended, inactive]

    # ─── User ───
    User:
      type: object
      required: [id, name, email, role, companyId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [super_admin, company_admin, agency_manager, booking_agent, boarding_agent, controller, accountant, driver, client]
        companyId:
          type: ["integer", "null"]
        agencyId:
          type: ["integer", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, suspended]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
        role:
